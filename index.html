    <script>
        
        window.document.onkeydown = function(e) {
  if (!e) {
    e = event;
  }
  if (e.keyCode == 27) {
    exitFullscreen();
  } 
  
}


function launchIntoFullscreen(element) {
  if (element.requestFullscreen) {
    element.requestFullscreen();
  } else if (element.mozRequestFullScreen) {
    element.mozRequestFullScreen();
  } else if (element.webkitRequestFullscreen) {
    element.webkitRequestFullscreen();
  } else if (element.msRequestFullscreen) {
    element.msRequestFullscreen();
  } else {
    element.classList.toggle('fullscreen');
  }
}
function fullscreenchanged(event) {
  if (document.fullscreenElement) {
    console.log(`Element: ${document.fullscreenElement.id} entered fullscreen mode.`);
  } else {
    console.log(`Element: EXIT fullscreen mode.`);
    exitFullscreen()
  }

  document.addEventListener("fullscreenchange", fullscreenchanged);
}
function lightbox_open() {
  var lightBoxVideo = document.getElementById("VisaChipCardVideo");
  window.scrollTo(0, 0);
  console.log(document.getElementById('video-container'))
  document.getElementById('video-container').style.display = 'flex';
  lightBoxVideo.play();
  console.log("fullscreening")
  console.log(document.getElementById('video-container').style)
  launchIntoFullscreen(document.getElementById('video-container'));
}

function lightbox_close() {
  var lightBoxVideo = document.getElementById("VisaChipCardVideo");
  lightBoxVideo.pause();
}


function playvideo(id){

var video = document.getElementById('VisaChipCardVideo');
var source = document.createElement('source');
video.pause();

video.innerHTML = ""

source.setAttribute('src', id+'.mp4');
video.setAttribute('src', id+'.mp4');
source.setAttribute('type', 'video/mp4');


video.appendChild(source);

video.load();
lightbox_open()
}
